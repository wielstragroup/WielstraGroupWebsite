<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Wielstra Group</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      //
      // segmentCount = 1 because the app is deployed under a project sub-path
      // (e.g. https://wielstragroup.github.io/WielstraGroup/).
      // Set segmentCount = 0 when deploying to a custom domain at the root.
      var segmentCount = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
